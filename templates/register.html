<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Date Palm Detector</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(to right, #fce4ec, #ffffff);
      font-family: 'Segoe UI', sans-serif;
    }

    .register-container {
      max-width: 500px;
      margin: 60px auto;
      padding: 40px;
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #c2185b;
    }

    .btn-pink {
      background-color: #c2185b;
      border: none;
      color: white;
    }

    .btn-pink:hover {
      background-color: #880e4f;
    }

    .form-group label {
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="register-container">
  <h2>User Registration</h2>
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" class="form-control" name="name" required>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" class="form-control" name="username" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-control" name="email" required>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" class="form-control" name="phone" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <button type="submit" class="btn btn-pink btn-block">Register</button>
    <p class="text-center mt-3">Already registered? <a href="{{ url_for('signin') }}">Login</a></p>
  </form>
</div>

</body>
</html>
